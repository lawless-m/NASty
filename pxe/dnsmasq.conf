# dnsmasq config for PXE boot server on Floor12
# Listens only on eth1 (192.168.99.1) — the dedicated thin client port

# Only serve on the PXE interface
interface=eth1
bind-interfaces

# DHCP range — gateway is Floor12, which forwards to eth0
dhcp-range=192.168.99.100,192.168.99.199,255.255.255.0,12h
dhcp-option=option:router,192.168.99.1
dhcp-option=option:dns-server,192.168.99.1

# Forward DNS to upstream (home router or public)
server=10.0.1.1

# TFTP for PXE boot
enable-tftp
tftp-root=/srv/tftp

# PXE boot: detect client type and serve appropriate bootloader
# Arch 00007/00009 = UEFI x86_64, 00000 = BIOS
# iPXE sets user-class "iPXE" — serve boot script instead of chainloader
dhcp-userclass=set:ipxe,iPXE
dhcp-match=set:efi-x86_64,93,7
dhcp-match=set:efi-x86_64,93,9
dhcp-boot=tag:ipxe,boot.ipxe
dhcp-boot=tag:efi-x86_64,ipxe.efi
dhcp-boot=undionly.kpxe

# Logging
log-dhcp
